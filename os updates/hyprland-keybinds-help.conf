# HyperWebster — searchable on-screen keybinding cheatsheet (Super+/ or Super+F1).
# Append/source this into ~/.config/caelestia/hypr-user.conf.
# Absolute path so the bind works regardless of the session PATH.
bind = Super, Slash, exec, ~/.local/bin/hyperwebster-keybinds
bind = Super, F1, exec, ~/.local/bin/hyperwebster-keybinds
