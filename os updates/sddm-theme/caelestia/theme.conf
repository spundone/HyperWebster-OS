# Default theme.conf — generated from the foam-sea wallpaper's Material scheme
# (the change-18 default). On an installed system, /usr/local/bin/sddm-theme-sync
# regenerates this file (and backgrounds/wallpaper.*) from the live caelestia
# scheme so the greeter follows the user's wallpaper/palette.
[General]
background=backgrounds/wallpaper.png
base=#0b0f11
surfaceContainer=#151a1e
surfaceContainerHigh=#1a2025
text=#dfe6ed
subtext=#a4acb2
outline=#41494e
primary=#a4cce5
onPrimary=#1b4459
error=#fa746f
fontFile=/etc/xdg/quickshell/caelestia/assets/google-sans-flex/GoogleSansFlex-VariableFont_GRAD,ROND,opsz,slnt,wdth,wght.ttf
fontFallback=Rubik
