# HyperWebster zephyr polish - optional overshoot motion (from flickowoa/zephyr)
# Applied by hyperwebster-zephyr-polish enable only.

animations {
    enabled = true
    bezier = zephyrOvershoot, 0.23, 1.23, 0.61, 1.08
    animation = windows, 1, 3.2, zephyrOvershoot, popin 80%
    animation = windowsOut, 1, 2.6, zephyrOvershoot, popin 80%
    animation = border, 1, 1.4, zephyrOvershoot
    animation = fade, 1, 1.6, zephyrOvershoot
    animation = workspaces, 1, 2.8, zephyrOvershoot, slidefade 12%
}
