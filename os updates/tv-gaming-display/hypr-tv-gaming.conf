# HyperWebster - 4K HDR TV display (144 Hz VRR)
# Auto-detect primary output when HDMI is connected; falls back to any 4K mode.
# hyprmoncfg profile: ~/.config/hyprmoncfg/profiles/tv-gaming-4k

# amdgpu HDR on Wayland (verify on your display hardware)
env = ENABLE_HDR_WSI,1
env = AMD_VULKAN_ICD,RADV

# Prefer VRR when advertised
misc {
    vfr = true
}

# Layer blur for caelestia shell (when blur toggle is enabled)
# layerrule = blur on, match:namespace caelestia-.*
# layerrule = ignorealpha 0.57, match:namespace caelestia-.*
