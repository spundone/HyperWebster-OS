# HyperWebster hypersmooth - tuned for 120/144 Hz displays
# Sourced from hypr-user.conf. Delete the source line to revert.

misc {
    vfr = true
}

animations {
    enabled = true
    bezier = hypersmooth, 0.25, 0.1, 0.25, 1
    animation = windows, 1, 2.8, hypersmooth, slide
    animation = windowsOut, 1, 2.2, hypersmooth, slide
    animation = border, 1, 1.2, hypersmooth
    animation = fade, 1, 1.4, hypersmooth
    animation = workspaces, 1, 2.2, hypersmooth, slidefade 8%
    animation = specialWorkspace, 1, 2.0, hypersmooth, slidefadevert
}
