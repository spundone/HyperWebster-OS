# HyperWebster: Omarchy-inspired utility keybinds (omarchy-extras layer).
# Appended to ~/.config/caelestia/hypr-user.conf after omarchy-keys-user.conf.

bind = Super+Ctrl, S, exec, hyperwebster-share                    # LAN file share (omarchy-send)
bind = Super+Ctrl, Period, exec, hyperwebster-transcode           # Transcode media for sharing
bind = Super+Ctrl, Print, exec, hyperwebster-ocr-capture          # OCR region → clipboard
bindl = Super+Ctrl, N, exec, hyperwebster-nightlight-toggle      # Night light (hyprsunset)
